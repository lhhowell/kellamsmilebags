<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#E8F5E9 0%,#F1F8E9 50%,#E0F2F1 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 48px;
  gap:20px;
}
.page-title{font-family:'Fredoka One',cursive;font-size:20px;color:#2E7D32;letter-spacing:1px;text-align:center;}
.page-title span{color:#C8860A}
.score-bar{display:flex;align-items:center;gap:16px;background:#fff;border-radius:50px;padding:10px 28px;box-shadow:0 4px 16px rgba(0,0,0,.08);font-family:'Fredoka One',cursive;font-size:16px;color:#2E7D32;}
.score-dots{display:flex;gap:6px;}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid #C8860A;background:#fff;transition:all .3s;}
.dot.found{background:#C8860A;transform:scale(1.2);}

/* IMAGE CROP — shows only top 58% of image */
.image-wrap{
  position:relative;
  max-width:480px;
  width:100%;
  cursor:crosshair;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
  /* 58% of (480 * 2000/1333) aspect ratio */
  height:418px;
}
.image-wrap img{
  width:100%;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  position:absolute;
  top:0;
  left:0;
}

.ripple{position:absolute;width:40px;height:40px;border-radius:50%;border:3px solid #FFD740;transform:translate(-50%,-50%) scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none;}
@keyframes rippleAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;}}
.found-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:28px;color:#fff;background:rgba(46,125,50,.85);padding:8px 20px;border-radius:50px;white-space:nowrap;animation:flashAnim 1.2s ease-out forwards;pointer-events:none;}
@keyframes flashAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.7);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}80%{opacity:1;}100%{opacity:0;transform:translate(-50%,-50%) scale(1);}}
.objects-label{font-family:'Fredoka One',cursive;font-size:15px;color:#555;letter-spacing:1px;text-align:center;}
.objects-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:480px;width:100%;}
.obj-card{background:#fff;border-radius:12px;padding:8px 6px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid transparent;transition:all .3s;font-size:10px;font-weight:700;color:#555;text-align:center;line-height:1.2;}
.obj-card.found{border-color:#2E7D32;background:#E8F5E9;color:#2E7D32;}
.obj-card .emoji{font-size:24px;line-height:1;}
.obj-card:not(.found) .emoji{filter:grayscale(60%);}
.win-screen{display:none;flex-direction:column;align-items:center;gap:12px;background:#fff;border-radius:20px;padding:28px 32px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.win-screen.show{display:flex;}
.win-icon{font-size:56px;}
.win-title{font-family:'Fredoka One',cursive;font-size:28px;color:#2E7D32;}
.win-msg{font-size:14px;color:#666;line-height:1.7;}
.play-again{margin-top:8px;padding:12px 32px;background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 16px rgba(46,125,50,.3);transition:all .2s;}
.play-again:hover{transform:translateY(-2px);}
.footer{font-size:11px;color:#aaa;letter-spacing:.5px;text-align:center;}
</style>

  {id:'tree',   emoji:'🌳', label:'Tree',         x:0.82, y:0.70, r:0.07},
];

var found = {};

function init(){
  var dots = document.getElementById('scoreDots');
  dots.innerHTML = '';
  OBJECTS.forEach(function(o){
    var d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + o.id;
    dots.appendChild(d);
  });
  var grid = document.getElementById('objectsGrid');
  grid.innerHTML = '';
  OBJECTS.forEach(function(o){
    var c = document.createElement('div');
    c.className = 'obj-card';
    c.id = 'card-' + o.id;
    c.innerHTML = '<div class="emoji">' + o.emoji + '</div>' + o.label;
    grid.appendChild(c);
  });
}

function handleClick(e){
  var wrap = document.getElementById('imageWrap');
  var rect = wrap.getBoundingClientRect();
  var xPct = (e.clientX - rect.left) / rect.width;
  // yPct needs to account for the full image height, not just the cropped visible height
  var fullImgHeight = rect.width * (2000/1333);
  var yPct = (e.clientY - rect.top) / fullImgHeight;

  var rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.left = (xPct * 100) + '%';
  rip.style.top = ((e.clientY - rect.top) / rect.height * 100) + '%';
  wrap.appendChild(rip);
  setTimeout(function(){ rip.remove(); }, 700);

  var hit = null;
  OBJECTS.forEach(function(o){
    if(found[o.id]) return;
    var dx = xPct - o.x;
    var dy = yPct - o.y;
    if(Math.sqrt(dx*dx + dy*dy) < o.r) hit = o;
  });

  if(hit){
    found[hit.id] = true;
    document.getElementById('dot-' + hit.id).classList.add('found');
    document.getElementById('card-' + hit.id).classList.add('found');
    var flash = document.createElement('div');
    flash.className = 'found-flash';
    flash.textContent = hit.emoji + ' ' + hit.label + ' found!';
    wrap.appendChild(flash);
    setTimeout(function(){ flash.remove(); }, 1300);
    updateScore();
  }
}

function updateScore(){
  var count = Object.keys(found).length;
  document.getElementById('scoreText').textContent = count + ' / 10';
  if(count === 10){
    setTimeout(function(){ document.getElementById('winScreen').classList.add('show'); }, 800);
  }
}

function resetGame(){
  found = {};
  document.getElementById('winScreen').classList.remove('show');
  document.querySelectorAll('.dot').forEach(function(d){ d.classList.remove('found'); });
  document.querySelectorAll('.obj-card').forEach(function(c){ c.classList.remove('found'); });
  document.getElementById('scoreText').textContent = '0 / 10';
}

init();
</script>
</body>
</html>
