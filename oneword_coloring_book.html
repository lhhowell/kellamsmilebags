<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneWord Coloring Book · Word &amp; Wonder</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #fdf7ee;
  --warm: #f0e0c0;
  --paper: #faf4e8;
  --brown: #7a4f2d;
  --dark: #3b2510;
  --accent: #e07a52;
  --accent2: #6abbe8;
  --green: #6ab87a;
  --gold: #c8923a;
  --shadow: rgba(59,37,16,0.22);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #c9a87a;
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 40px,
    rgba(255,255,255,0.04) 40px, rgba(255,255,255,0.04) 80px
  );
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Nunito', sans-serif;
  padding: 0 0 40px;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  width: 100%;
  background: var(--dark);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  position: sticky;
  top: 0;
  z-index: 100;
}

header .logo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.5rem;
  color: #f5d090;
  letter-spacing: 0.03em;
}
header .logo span { color: var(--accent); }

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.word-select {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  background: rgba(255,255,255,0.12);
  color: #f5d090;
  border: 1.5px solid rgba(245,208,144,0.3);
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  outline: none;
  transition: background 0.2s;
}
.word-select:hover { background: rgba(255,255,255,0.2); }
.word-select option { background: var(--dark); color: #f5d090; }

.btn-print {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.88rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.1s;
}
.btn-print:hover { background: #c8633b; transform: translateY(-1px); }
.btn-print:active { transform: translateY(0); }

/* ── BOOK STAGE ── */
.stage {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  width: 100%;
  padding: 36px 16px 20px;
}

.nav-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--dark);
  border: 3px solid var(--gold);
  color: #f5d090;
  font-size: 1.5rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, transform 0.12s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.28);
  user-select: none;
}
.nav-btn:hover { background: #5a3218; transform: scale(1.07); }
.nav-btn:active { transform: scale(0.95); }
.nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

/* ── BOOK CONTAINER ── */
.book-wrap {
  perspective: 1400px;
  position: relative;
}

.book {
  width: 380px;
  height: 520px;
  position: relative;
  transform-style: preserve-3d;
}

/* Spine decoration */
.book::before {
  content: '';
  position: absolute;
  left: -10px; top: 0;
  width: 18px; height: 100%;
  background: linear-gradient(to right, #5a3218, #8b6040, #5a3218);
  border-radius: 4px 0 0 4px;
  box-shadow: -3px 0 12px rgba(0,0,0,0.4);
  z-index: 5;
}

/* Page stack illusion */
.book::after {
  content: '';
  position: absolute;
  right: -6px; top: 3px;
  width: 6px; height: calc(100% - 6px);
  background: repeating-linear-gradient(
    to bottom, #e8dcc8 0px, #d4c8b0 2px, #e8dcc8 3px
  );
  border-radius: 0 2px 2px 0;
}

.page-slot {
  position: absolute;
  inset: 0;
  border-radius: 0 8px 8px 0;
  overflow: hidden;
  box-shadow:
    4px 4px 20px rgba(0,0,0,0.3),
    8px 8px 40px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(0,0,0,0.06);
  background: #fff;
  transform-style: preserve-3d;
  backface-visibility: hidden;
}

/* Page flip animation */
.page-slot.flipping-out {
  animation: flipOut 0.38s cubic-bezier(.4,0,.6,1) forwards;
  transform-origin: left center;
}
.page-slot.flipping-in {
  animation: flipIn 0.38s cubic-bezier(.4,0,.6,1) forwards;
  transform-origin: left center;
}
.page-slot.flipping-out-back {
  animation: flipOutBack 0.38s cubic-bezier(.4,0,.6,1) forwards;
  transform-origin: left center;
}
.page-slot.flipping-in-back {
  animation: flipInBack 0.38s cubic-bezier(.4,0,.6,1) forwards;
  transform-origin: left center;
}

@keyframes flipOut {
  0% { transform: perspective(1400px) rotateY(0deg); opacity:1; }
  100% { transform: perspective(1400px) rotateY(-90deg); opacity:0; }
}
@keyframes flipIn {
  0% { transform: perspective(1400px) rotateY(90deg); opacity:0; }
  100% { transform: perspective(1400px) rotateY(0deg); opacity:1; }
}
@keyframes flipOutBack {
  0% { transform: perspective(1400px) rotateY(0deg); opacity:1; }
  100% { transform: perspective(1400px) rotateY(90deg); opacity:0; }
}
@keyframes flipInBack {
  0% { transform: perspective(1400px) rotateY(-90deg); opacity:0; }
  100% { transform: perspective(1400px) rotateY(0deg); opacity:1; }
}

/* ── COVER PAGE ── */
.cover-content {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #3b2510 0%, #6b3f20 40%, #8b5a30 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
  overflow: hidden;
}
.cover-content::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 2.5px solid rgba(245,208,144,0.35);
  border-radius: 4px;
  pointer-events: none;
}
.cover-content::after {
  content: '';
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(245,208,144,0.18);
  border-radius: 3px;
  pointer-events: none;
}
.cover-star {
  font-size: 2rem;
  margin-bottom: 8px;
}
.cover-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.6rem;
  color: #f5d090;
  text-align: center;
  line-height: 1.1;
  letter-spacing: 0.02em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.cover-title span { color: var(--accent); }
.cover-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: rgba(245,208,144,0.7);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 12px;
  text-align: center;
}
.cover-divider {
  width: 80px; height: 2px;
  background: linear-gradient(to right, transparent, #f5d090, transparent);
  margin: 16px auto;
}
.cover-count {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  color: var(--accent);
  text-align: center;
  letter-spacing: 0.05em;
}
.cover-badge {
  margin-top: 20px;
  background: rgba(245,208,144,0.12);
  border: 1.5px solid rgba(245,208,144,0.3);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 0.78rem;
  color: rgba(245,208,144,0.8);
  font-weight: 600;
  letter-spacing: 0.08em;
}

/* ── COLORING PAGE ── */
.coloring-page {
  width: 100%; height: 100%;
  background: #fff;
  display: flex;
  flex-direction: column;
  position: relative;
}
.coloring-page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 8px;
}
.page-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: rgba(59,37,16,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: #b08060;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-top: 1px solid rgba(0,0,0,0.06);
}

/* ── PAGE COUNTER ── */
.page-counter {
  text-align: center;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  color: var(--dark);
  background: rgba(255,255,255,0.5);
  padding: 4px 18px;
  border-radius: 20px;
  margin-top: 8px;
}

/* ── THUMBNAIL STRIP ── */
.thumb-section {
  width: 100%;
  max-width: 920px;
  padding: 0 16px;
  margin-top: 24px;
}
.thumb-label {
  font-family: 'Fredoka One', cursive;
  font-size: 0.9rem;
  color: var(--dark);
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.06em;
  opacity: 0.7;
}

.thumb-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 4px 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--brown) transparent;
}
.thumb-scroll::-webkit-scrollbar { height: 5px; }
.thumb-scroll::-webkit-scrollbar-track { background: transparent; }
.thumb-scroll::-webkit-scrollbar-thumb { background: var(--brown); border-radius: 4px; }

.thumb-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.thumb-word {
  font-family: 'Fredoka One', cursive;
  font-size: 0.65rem;
  color: var(--dark);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.thumb-pages {
  display: flex;
  gap: 5px;
}

.thumb {
  width: 52px;
  height: 70px;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  flex-shrink: 0;
  position: relative;
}
.thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.thumb.cover-thumb {
  background: linear-gradient(160deg, #3b2510, #8b5a30);
  display: flex;
  align-items: center;
  justify-content: center;
}
.thumb.cover-thumb span {
  font-family: 'Fredoka One', cursive;
  font-size: 0.55rem;
  color: #f5d090;
  text-align: center;
  line-height: 1.2;
  padding: 4px;
}
.thumb:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}
.thumb.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 4px 12px rgba(224,122,82,0.35);
}
.thumb-num {
  position: absolute;
  bottom: 2px; right: 3px;
  font-size: 0.55rem;
  font-weight: 800;
  color: rgba(0,0,0,0.35);
}

/* ── SEPARATOR ── */
.word-sep {
  width: 1px;
  height: 70px;
  background: rgba(59,37,16,0.2);
  align-self: flex-end;
  flex-shrink: 0;
}

/* ── PRINT STYLES ── */
@media print {
  body { background: white !important; padding: 0 !important; }
  header, .stage .nav-btn, .thumb-section, .page-counter, .thumb-label,
  .page-label, .book::before, .book::after { display: none !important; }
  .stage { padding: 0 !important; }
  .book-wrap, .book, .page-slot {
    width: 100vw !important;
    height: 100vh !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }
  .cover-content { display: none !important; }
  .coloring-page img {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    padding: 16px !important;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">OneWord <span>Coloring Book</span></div>
  <div class="header-controls">
    <select class="word-select" id="wordJump" onchange="jumpToWord(this.value)">
      <option value="">— Jump to Word —</option>
    </select>
    <button class="btn-print" onclick="printPage()">
      🖨️ Print This Page
    </button>
  </div>
</header>

<!-- BOOK STAGE -->
<div class="stage">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>&#8592;</button>

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div class="book-wrap">
      <div class="book">
        <div class="page-slot" id="pageSlot">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
    <div class="page-counter" id="pageCounter">Cover &nbsp;·&nbsp; 1 of 25</div>
  </div>

  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
</div>

<!-- THUMBNAILS -->
<div class="thumb-section">
  <div class="thumb-label">All Pages</div>
  <div class="thumb-scroll" id="thumbStrip"></div>
</div>

<script>
// ─────────────────────────────
//  PAGE DATA
// ─────────────────────────────
const words = [
  {
    word: 'Adapt',
    pages: ['adapt_1.png', 'Adapt_2.png', 'adapt_3.png', 'adapt_4.png']
  },
  {
    word: 'Anchor',
    pages: ['Anchor_1.png', 'Anchor_2_.png', 'Anchor_3.png']
  },
  {
    word: 'Balance',
    pages: ['Balance_1.png', 'Balance_2.png', 'Balance_3.png']
  },
  {
    word: 'Bloom',
    pages: ['Bloom_1.png', 'Bloom_2.png', 'Bloom_3.png']
  },
  {
    word: 'Breathe',
    pages: ['Breathe_1.png', 'Breathe_2.png', 'Breathe_3.png']
  },
  {
    word: 'Clear',
    pages: ['Clear_1.png', 'Clear_2.png', 'Clear_3.png']
  },
  {
    word: 'Connect',
    pages: ['Connect_1.png', 'Connect_2.png', 'Connect_3.png']
  },
  {
    word: 'Cycle',
    pages: ['Cycle_1.png', 'Cycle_2.png']
  }
];

// Flatten into a single pages array (index 0 = cover)
const allPages = [{ type: 'cover' }];
words.forEach(w => {
  w.pages.forEach((src, i) => {
    allPages.push({ type: 'coloring', word: w.word, src, num: i + 1, total: w.pages.length });
  });
});

let currentIndex = 0;
let animating = false;

// ─────────────────────────────
//  RENDER
// ─────────────────────────────
function renderPage(index) {
  const page = allPages[index];
  const slot = document.getElementById('pageSlot');

  if (page.type === 'cover') {
    slot.innerHTML = `
      <div class="cover-content">
        <div class="cover-star">✦</div>
        <div class="cover-title">OneWord<br><span>Coloring</span><br>Book</div>
        <div class="cover-divider"></div>
        <div class="cover-sub">Word &amp; Wonder</div>
        <div class="cover-count">${allPages.length - 1} Coloring Pages</div>
        <div class="cover-badge">Print · Color · Explore</div>
      </div>`;
  } else {
    slot.innerHTML = `
      <div class="coloring-page">
        <img src="${page.src}" alt="${page.word} coloring page ${page.num}" />
        <div class="page-label">${page.word} &nbsp;·&nbsp; Version ${page.num} of ${page.total}</div>
      </div>`;
  }

  // Counter
  const label = page.type === 'cover'
    ? `Cover &nbsp;·&nbsp; 1 of ${allPages.length}`
    : `${page.word} — Version ${page.num} &nbsp;·&nbsp; Page ${index + 1} of ${allPages.length}`;
  document.getElementById('pageCounter').innerHTML = label;

  // Buttons
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === allPages.length - 1;

  // Thumbnails
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === index);
    if (i === index) t.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  });
}

// ─────────────────────────────
//  NAVIGATION
// ─────────────────────────────
function navigate(dir) {
  if (animating) return;
  const next = currentIndex + dir;
  if (next < 0 || next >= allPages.length) return;

  animating = true;
  const slot = document.getElementById('pageSlot');
  const outClass = dir > 0 ? 'flipping-out' : 'flipping-out-back';
  const inClass  = dir > 0 ? 'flipping-in'  : 'flipping-in-back';

  slot.classList.add(outClass);
  setTimeout(() => {
    slot.classList.remove(outClass);
    currentIndex = next;
    renderPage(currentIndex);
    slot.classList.add(inClass);
    setTimeout(() => {
      slot.classList.remove(inClass);
      animating = false;
    }, 380);
  }, 380);
}

function goToPage(index) {
  if (animating || index === currentIndex) return;
  const dir = index > currentIndex ? 1 : -1;
  animating = true;
  const slot = document.getElementById('pageSlot');
  const outClass = dir > 0 ? 'flipping-out' : 'flipping-out-back';
  const inClass  = dir > 0 ? 'flipping-in'  : 'flipping-in-back';

  slot.classList.add(outClass);
  setTimeout(() => {
    slot.classList.remove(outClass);
    currentIndex = index;
    renderPage(currentIndex);
    slot.classList.add(inClass);
    setTimeout(() => {
      slot.classList.remove(inClass);
      animating = false;
    }, 380);
  }, 380);
}

function jumpToWord(word) {
  if (!word) return;
  const idx = allPages.findIndex(p => p.type === 'coloring' && p.word === word);
  if (idx !== -1) goToPage(idx);
  document.getElementById('wordJump').value = '';
}

function printPage() {
  window.print();
}

// ─────────────────────────────
//  BUILD THUMBNAILS & JUMP MENU
// ─────────────────────────────
function buildUI() {
  const strip = document.getElementById('thumbStrip');
  const select = document.getElementById('wordJump');

  // Cover thumb
  const coverGroup = document.createElement('div');
  coverGroup.className = 'thumb-group';
  const coverPages = document.createElement('div');
  coverPages.className = 'thumb-pages';
  const coverThumb = document.createElement('div');
  coverThumb.className = 'thumb cover-thumb active';
  coverThumb.innerHTML = '<span>ONE<br>WORD</span>';
  coverThumb.onclick = () => goToPage(0);
  coverPages.appendChild(coverThumb);
  coverGroup.appendChild(coverPages);
  strip.appendChild(coverGroup);

  let pageIdx = 1;
  words.forEach((w, wi) => {
    // Separator
    if (wi > 0) {
      const sep = document.createElement('div');
      sep.className = 'word-sep';
      strip.appendChild(sep);
    }

    const group = document.createElement('div');
    group.className = 'thumb-group';

    const wordLabel = document.createElement('div');
    wordLabel.className = 'thumb-word';
    wordLabel.textContent = w.word;
    group.appendChild(wordLabel);

    const pagesRow = document.createElement('div');
    pagesRow.className = 'thumb-pages';

    w.pages.forEach((src, pi) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.setAttribute('data-idx', pageIdx);
      thumb.innerHTML = `<img src="${src}" alt="${w.word} ${pi+1}" loading="lazy"><span class="thumb-num">${pi+1}</span>`;
      const capturedIdx = pageIdx;
      thumb.onclick = () => goToPage(capturedIdx);
      pagesRow.appendChild(thumb);
      pageIdx++;
    });

    group.appendChild(pagesRow);
    strip.appendChild(group);

    // Jump menu option
    const opt = document.createElement('option');
    opt.value = w.word;
    opt.textContent = w.word;
    select.appendChild(opt);
  });
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

// Init
buildUI();
renderPage(0);
</script>
<div style="position:fixed;bottom:20px;right:20px;z-index:999;">
  <a href="https://lhhowell.github.io/kellamsmilebags/DigitalArts_Menu.html" style="display:inline-flex;align-items:center;gap:8px;background:#1B4332;color:#E8C97A;border:none;border-radius:50px;padding:11px 20px;font-family:'Fredoka One',cursive;font-size:14px;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.25);">
    🎨 Digital Arts Hub
  </a>
</div>
</body>
</html>
