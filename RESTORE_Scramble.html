<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RESTORE Scramble — Word World</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#F0C040;--gold-dark:#C8860A;--black:#111;--dark:#1A1A1A;--accent:#2d5016;}
body{font-family:'Nunito',sans-serif;background:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.hdr{width:100%;background:var(--dark);border-bottom:3px solid var(--accent);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold);}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}
.back-btn{padding:8px 18px;border:2px solid #333;border-radius:50px;background:transparent;font-family:'Fredoka One',cursive;font-size:13px;color:#888;cursor:pointer;text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--gold);}
.main{display:flex;flex-direction:column;align-items:center;padding:28px 20px;gap:20px;width:100%;max-width:520px;}
.timer-ring{position:relative;width:100px;height:100px;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke:#2A2A2A;stroke-width:8;}
.timer-ring .progress{stroke:var(--accent);stroke-width:8;stroke-dasharray:283;stroke-dashoffset:0;transition:stroke-dashoffset .5s linear,stroke .5s;stroke-linecap:round;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:28px;color:var(--gold);}
.clue-box{background:#1A1A1A;border:2px solid var(--accent);border-radius:14px;padding:14px 20px;text-align:center;width:100%;}
.clue-label{font-family:'Fredoka One',cursive;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-dark);margin-bottom:6px;}
.clue-text{font-size:15px;color:#fff;line-height:1.6;font-weight:700;}
.scrambled-letters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.scr-letter{width:44px;height:52px;background:#1A1A1A;border:2px solid #2A2A2A;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);cursor:pointer;transition:all .18s;user-select:none;}
.scr-letter:hover{border-color:var(--accent);transform:translateY(-3px);background:#1F1700;}
.scr-letter.used{opacity:.25;cursor:not-allowed;transform:none;}
.answer-slots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.ans-slot{width:44px;height:52px;border-bottom:3px solid var(--accent);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:'Fredoka One',cursive;font-size:24px;color:#fff;cursor:pointer;transition:all .18s;}
.ans-slot:hover{border-bottom-color:var(--gold);}
.ans-slot.filled{color:var(--gold);}
.action-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.action-btn{padding:10px 22px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:all .2s;}
.btn-check{background:linear-gradient(135deg,var(--accent),var(--gold));color:#111;border:none;}
.btn-clear{background:transparent;border:2px solid #333;color:#888;}
.btn-clear:hover{border-color:var(--accent);color:var(--gold);}
.feedback-msg{font-family:'Fredoka One',cursive;font-size:16px;text-align:center;min-height:24px;}
.result-banner{display:none;background:linear-gradient(135deg,#1F1700,#2A1A00);border:2px solid var(--gold);border-radius:14px;padding:20px 24px;text-align:center;width:100%;}
.result-banner.show{display:block;}
.result-icon{font-size:52px;margin-bottom:8px;}
.result-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--gold);margin-bottom:8px;}
.result-msg{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:14px;}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.play-again{padding:10px 24px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#111;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">🔤 RESTORE Scramble</div>
    <div class="hdr-sub">Unscramble before time runs out! &middot; Word World</div>
  </div>
  <a href="KSB_Stories_Kiosk.html" class="back-btn">← Word World</a>
</div>
<div class="main">
  <div class="timer-ring">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45"/>
      <circle class="progress" id="timerCircle" cx="50" cy="50" r="45"/>
    </svg>
    <div class="timer-num" id="timerNum">30</div>
  </div>
  <div class="clue-box">
    <div class="clue-label">💡 Clue</div>
    <div class="clue-text">Bringing back what matters most</div>
  </div>
  <div class="scrambled-letters" id="scrambledLetters"></div>
  <div class="answer-slots" id="answerSlots"></div>
  <div class="feedback-msg" id="feedbackMsg"></div>
  <div class="action-btns">
    <button class="action-btn btn-check" onclick="checkAnswer()">✓ Check Answer</button>
    <button class="action-btn btn-clear" onclick="clearAnswer()">✕ Clear</button>
  </div>
  <div class="result-banner" id="resultBanner">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-btns">
      <button class="play-again" onclick="resetGame()">🔤 Play Again</button>
      <a href="KSB_Stories_Kiosk.html" class="back-btn">← Word World</a>
    </div>
  </div>
</div>
<script>
var WORD='RESTORE';
var SCRAMBLED='TERRESO';
var TIME_LIMIT=30;
var answer=[],timer=null,timeLeft=TIME_LIMIT,gameOver=false;

function buildLetters(){
  var row=document.getElementById('scrambledLetters');
  row.innerHTML='';
  SCRAMBLED.split('').forEach(function(l,i){
    var d=document.createElement('div');
    d.className='scr-letter';d.textContent=l;d.id='scr-'+i;
    d.onclick=(function(idx,letter){return function(){pickLetter(idx,letter);};})(i,l);
    row.appendChild(d);
  });
}

function buildSlots(){
  var row=document.getElementById('answerSlots');
  row.innerHTML='';
  for(var i=0;i<WORD.length;i++){
    var d=document.createElement('div');
    d.className='ans-slot';d.id='slot-'+i;
    d.onclick=(function(idx){return function(){removeLetter(idx);};})(i);
    row.appendChild(d);
  }
}

function pickLetter(idx,letter){
  if(gameOver)return;
  var el=document.getElementById('scr-'+idx);
  if(el.classList.contains('used'))return;
  if(answer.length>=WORD.length)return;
  answer.push({idx:idx,letter:letter});
  el.classList.add('used');
  updateSlots();
}

function removeLetter(slotIdx){
  if(gameOver||slotIdx>=answer.length)return;
  var removed=answer.splice(slotIdx,1)[0];
  document.getElementById('scr-'+removed.idx).classList.remove('used');
  updateSlots();
}

function updateSlots(){
  for(var i=0;i<WORD.length;i++){
    var s=document.getElementById('slot-'+i);
    if(i<answer.length){s.textContent=answer[i].letter;s.classList.add('filled');}
    else{s.textContent='';s.classList.remove('filled');}
  }
}

function clearAnswer(){
  answer=[];
  document.querySelectorAll('.scr-letter').forEach(function(el){el.classList.remove('used');});
  updateSlots();
}

function checkAnswer(){
  if(gameOver)return;
  var guess=answer.map(function(a){return a.letter;}).join('');
  if(guess===WORD){
    clearInterval(timer);showResult(true);
  }else{
    document.getElementById('feedbackMsg').style.color='#c0392b';
    document.getElementById('feedbackMsg').textContent='Not quite — try again! 🌿';
    setTimeout(function(){document.getElementById('feedbackMsg').textContent='';},1500);
  }
}

function startTimer(){
  timeLeft=TIME_LIMIT;
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById('timerNum').textContent=timeLeft;
    var pct=timeLeft/TIME_LIMIT;
    document.getElementById('timerCircle').style.strokeDashoffset=283*(1-pct);
    document.getElementById('timerCircle').style.stroke=timeLeft>10?'var(--accent)':'#c0392b';
    if(timeLeft<=0){clearInterval(timer);showResult(false);}
  },1000);
}

function showResult(won){
  gameOver=true;
  var banner=document.getElementById('resultBanner');
  banner.classList.add('show');
  if(won){
    document.getElementById('resultIcon').textContent='⚡';
    document.getElementById('resultTitle').textContent='Unscrambled in '+(TIME_LIMIT-timeLeft)+'s!';
    document.getElementById('resultMsg').textContent=WORD+' — '+'Bringing back what matters most'+'. You had it all along — just needed to find the right order!';
  }else{
    document.getElementById('resultIcon').textContent='⏰';
    document.getElementById('resultTitle').textContent='Time! The word was '+WORD;
    document.getElementById('resultMsg').textContent='Bringing back what matters most'+' — now you know! Try again and unscramble it faster!';
  }
}

function resetGame(){
  answer=[];gameOver=false;timeLeft=TIME_LIMIT;
  clearInterval(timer);
  document.getElementById('timerNum').textContent=TIME_LIMIT;
  document.getElementById('timerCircle').style.strokeDashoffset=0;
  document.getElementById('timerCircle').style.stroke='var(--accent)';
  document.getElementById('feedbackMsg').textContent='';
  document.getElementById('resultBanner').classList.remove('show');
  buildLetters();buildSlots();startTimer();
}

buildLetters();buildSlots();startTimer();
</script>
</body>
</html>
